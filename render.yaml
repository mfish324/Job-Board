services:
  - type: web
    name: realjobsrealpeople
    runtime: python
    buildCommand: "bash build.sh"
    # 512MB starter plan: 4 workers would OOM. 2 workers gives concurrency so
    # one slow request can't block the whole site; --max-requests recycles each
    # worker periodically so RSS can't creep to the 512MB ceiling (Python rarely
    # returns memory to the OS); --timeout 60 kills runaway requests sooner.
    # --max-requests lowered 400 -> 150 (2026-06-03): at 400, under low traffic a
    # worker took hours to recycle and RSS crept to ~91% (486MB), triggering a
    # disruptive recycle that 502'd a user. 150 recycles ~2.5x sooner so RSS
    # plateaus well below the ceiling and each recycle stays small.
    startCommand: "gunicorn jobboard.wsgi:application --workers 2 --timeout 60 --max-requests 150 --max-requests-jitter 50"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com,realjobsrealpeople.net,www.realjobsrealpeople.net"
      - key: DATABASE_URL
        fromDatabase:
          name: realjobsrealpeople-db
          property: connectionString
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USE_TLS
        value: True
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: noreply@realjobsrealpeople.net
      - key: SITE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

# Database is configured manually in Render dashboard
# Do not auto-create database from render.yaml to prevent data loss
